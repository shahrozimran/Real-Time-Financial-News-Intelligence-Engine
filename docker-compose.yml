services:
  # ─────────────────────────────────────────────────────────────────────────────
  # Kafka Broker (KRaft mode — no ZooKeeper)
  # ─────────────────────────────────────────────────────────────────────────────
  kafka:
    image: bitnami/kafka:3.7
    container_name: finintel-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft settings
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      # Listeners
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      # Cluster
      - KAFKA_KRAFT_CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
      # Topic defaults
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_CFG_NUM_PARTITIONS=3
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────────────────
  # One-shot container to create Kafka topics
  # ─────────────────────────────────────────────────────────────────────────────
  kafka-init:
    image: bitnami/kafka:3.7
    container_name: finintel-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Creating Kafka topics..."
        kafka-topics.sh --create --if-not-exists --topic news-feed    --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1
        kafka-topics.sh --create --if-not-exists --topic social-posts --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1
        kafka-topics.sh --create --if-not-exists --topic stock-prices --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1
        echo "Topics created:"
        kafka-topics.sh --list --bootstrap-server kafka:9092
        echo "Done."

  # ─────────────────────────────────────────────────────────────────────────────
  # Flask Web Dashboard
  # ─────────────────────────────────────────────────────────────────────────────
  webapp:
    build: .
    container_name: finintel-webapp
    ports:
      - "5000:5000"
    environment:
      - KAFKA_BROKER=kafka:9092
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - FLASK_DEBUG=false
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - app_data:/app/data
    command: ["python", "webapp/app.py"]
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  # RSS News Producer
  # ─────────────────────────────────────────────────────────────────────────────
  rss-producer:
    build: .
    container_name: finintel-rss-producer
    environment:
      - KAFKA_BROKER=kafka:9092
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    command: ["python", "ingestion/rss_producer.py"]
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  # Stock Price Producer
  # ─────────────────────────────────────────────────────────────────────────────
  stock-producer:
    build: .
    container_name: finintel-stock-producer
    environment:
      - KAFKA_BROKER=kafka:9092
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    command: ["python", "ingestion/stock_producer.py"]
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  # Batch Pipeline (runs once then exits — use `docker compose run` to re-run)
  # ─────────────────────────────────────────────────────────────────────────────
  batch-pipeline:
    build: .
    container_name: finintel-batch-pipeline
    environment:
      - KAFKA_BROKER=kafka:9092
      - SPARK_MASTER=local[*]
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - app_data:/app/data
    command: ["python", "processing/batch_pipeline.py", "--source", "sample"]
    profiles:
      - pipeline

volumes:
  kafka_data:
  app_data:
